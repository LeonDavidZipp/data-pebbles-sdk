name: tests

on:
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev --frozen
      - run: uv tool run ruff check src/data_pebbles/sdk.py
      - run: uv tool run ruff format --check src/data_pebbles/sdk.py

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev --frozen
      - run: uv run pytest test/test_sdk.py -x --tb=short
